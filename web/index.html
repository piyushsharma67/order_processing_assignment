<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Order</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f4f6f8;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }

    header {
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .subtitle {
      margin: 0;
      color: #5c6670;
    }

    .auth-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      font-size: 0.9rem;
    }

    .auth-bar.hidden {
      display: none;
    }

    .auth-bar-info {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      min-width: 0;
    }

    .auth-bar-info .customer-id {
      font-size: 0.82rem;
      color: #5c6670;
    }

    .auth-bar-info .customer-id strong {
      color: #1a1a1a;
      font-weight: 600;
    }

    .app-nav {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .app-nav.hidden {
      display: none;
    }

    .app-nav-tab {
      flex: 1;
      padding: 0.65rem 1rem;
      border: 1px solid #c8d0da;
      border-radius: 10px;
      background: #fff;
      color: #5c6670;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .app-nav-tab.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
    }

    .view-panel.hidden {
      display: none;
    }

    .orders-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .orders-toolbar select {
      width: auto;
      min-width: 160px;
      padding: 0.5rem 0.75rem;
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .order-card {
      border: 1px solid #dde3ea;
      border-radius: 10px;
      padding: 1rem;
      background: #fafbfc;
    }

    .order-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .order-card-header h3 {
      margin: 0 0 0.2rem;
      font-size: 0.92rem;
      font-weight: 600;
      word-break: break-all;
    }

    .order-card-header .meta {
      margin: 0;
      font-size: 0.78rem;
      color: #5c6670;
    }

    .order-card-total {
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .status-badge.pending {
      background: #fef0c7;
      color: #93370d;
    }

    .status-badge.processing {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .status-badge.shipped {
      background: #e0e7ff;
      color: #4338ca;
    }

    .status-badge.delivered {
      background: #d1fadf;
      color: #067647;
    }

    .status-badge.cancelled {
      background: #fee4e2;
      color: #912018;
    }

    .order-items {
      margin: 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid #eef2f6;
      padding-top: 0.75rem;
    }

    .order-items li {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      font-size: 0.82rem;
      padding: 0.25rem 0;
    }

    .order-items li span:last-child {
      white-space: nowrap;
      font-weight: 500;
    }

    .order-card-actions {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #eef2f6;
    }

    .btn-danger {
      background: #fff;
      border-color: #fecdca;
      color: #b42318;
    }

    .btn-danger:hover {
      background: #fef3f2;
    }

    .auth-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .auth-tab {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: 1px solid #c8d0da;
      border-radius: 8px;
      background: #f4f6f8;
      color: #5c6670;
      font: inherit;
      font-weight: 500;
      cursor: pointer;
    }

    .auth-tab.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
    }

    .auth-hint {
      margin: 0.75rem 0 0;
      font-size: 0.85rem;
      color: #5c6670;
    }

    .auth-form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
      align-items: end;
    }

    .auth-form .btn-primary {
      width: 100%;
      margin-top: 0.25rem;
    }

    .hidden {
      display: none !important;
    }

    .card {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
    }

    .card h2 {
      margin: 0 0 1rem;
      font-size: 1rem;
      font-weight: 600;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.35rem;
    }

    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #c8d0da;
      border-radius: 8px;
      font: inherit;
      background: #fff;
    }

    input:focus {
      outline: 2px solid #2563eb;
      outline-offset: 1px;
      border-color: #2563eb;
    }

    .items-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .product-card {
      border: 1px solid #dde3ea;
      border-radius: 10px;
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      background: #fafbfc;
    }

    .product-card img {
      width: 100%;
      height: 140px;
      object-fit: contain;
      background: #fff;
      border-radius: 8px;
    }

    .product-card .category {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #2563eb;
      font-weight: 600;
    }

    .product-card h3 {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .product-card .price {
      font-size: 1.05rem;
      font-weight: 700;
      color: #b12704;
    }

    .product-card .stock {
      font-size: 0.75rem;
      color: #067647;
    }

    .product-card .desc {
      margin: 0;
      font-size: 0.78rem;
      color: #5c6670;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 1fr 80px 100px 36px;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid #eef2f6;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item .name {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .cart-item .unit-price {
      font-size: 0.8rem;
      color: #5c6670;
    }

    .cart-empty {
      color: #5c6670;
      font-size: 0.9rem;
      margin: 0;
    }

    .loading {
      color: #5c6670;
      font-size: 0.9rem;
    }

    .remove-btn {
      width: 36px;
      height: 36px;
      border: 1px solid #dde3ea;
      border-radius: 8px;
      background: #fff;
      color: #b42318;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
    }

    .remove-btn:hover {
      background: #fef3f2;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.55rem 0.9rem;
      border-radius: 8px;
      border: 1px solid transparent;
      font: inherit;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-secondary {
      background: #fff;
      border-color: #c8d0da;
      color: #1a1a1a;
    }

    .btn-secondary:hover {
      background: #f4f6f8;
    }

    .btn-secondary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-secondary.btn-in-cart {
      background: #ecfdf3;
      border-color: #abefc6;
      color: #067647;
    }

    .btn-secondary.btn-in-cart:hover:not(:disabled) {
      background: #d1fadf;
    }

    .product-actions {
      margin-top: auto;
    }

    .product-actions .add-to-cart-btn {
      width: 100%;
    }

    .qty-stepper {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      width: 100%;
    }

    .qty-stepper .qty-btn {
      flex: 0 0 36px;
      width: 36px;
      height: 36px;
      padding: 0;
      border: 1px solid #c8d0da;
      border-radius: 8px;
      background: #fff;
      font: inherit;
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
    }

    .qty-stepper .qty-btn:hover:not(:disabled) {
      background: #f4f6f8;
    }

    .qty-stepper .qty-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .qty-stepper .qty-value {
      flex: 1;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.45rem 0.5rem;
      border: 1px solid #abefc6;
      border-radius: 8px;
      background: #ecfdf3;
      color: #067647;
    }

    .product-card .stock.out-of-stock {
      color: #b42318;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid #eef2f6;
    }

    .total {
      font-size: 1.125rem;
      font-weight: 600;
    }

    .message {
      display: none;
      padding: 0.85rem 1rem;
      border-radius: 8px;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .message.visible {
      display: block;
    }

    .message.error {
      background: #fef3f2;
      border: 1px solid #fecdca;
      color: #912018;
    }

    .message.success {
      background: #ecfdf3;
      border: 1px solid #abefc6;
      color: #067647;
    }

    .message pre {
      margin: 0.5rem 0 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.8rem;
      background: rgba(255, 255, 255, 0.6);
      padding: 0.5rem;
      border-radius: 6px;
    }

    @media (max-width: 640px) {
      .cart-item {
        grid-template-columns: 1fr 70px 36px;
      }

      .cart-item .unit-price {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <h1>Order processing</h1>
      <p class="subtitle">Sign in, shop the catalog, place orders, and track your order history.</p>
    </header>

    <nav id="app-nav" class="app-nav hidden" aria-label="Main navigation">
      <button type="button" class="app-nav-tab active" data-view="shop">Shop</button>
      <button type="button" class="app-nav-tab" data-view="orders">My orders</button>
    </nav>

    <div id="auth-bar" class="auth-bar hidden">
      <div class="auth-bar-info">
        <span>Signed in</span>
        <span class="customer-id">Customer ID: <strong id="auth-customer-id">—</strong></span>
      </div>
      <button type="button" class="btn btn-secondary" id="logout-btn">Sign out</button>
    </div>

    <div class="card" id="auth-card">
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" id="tab-signin">Sign in</button>
        <button type="button" class="auth-tab" id="tab-signup">Sign up</button>
      </div>

      <form id="login-form" class="auth-form">
        <h2 id="auth-title">Sign in</h2>
        <div>
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div id="confirm-password-field" class="hidden">
          <label for="confirm_password">Confirm password</label>
          <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" id="auth-submit-btn">Sign in</button>
        <p class="auth-hint" id="auth-hint">Default account: admin / admin</p>
      </form>
      <div id="login-message" class="message" role="alert"></div>
    </div>

    <form id="order-form" class="view-panel hidden">
      <div class="card">
        <h2>Catalog</h2>
        <div id="catalog" class="catalog-grid">
          <p class="loading">Loading products…</p>
        </div>
      </div>

      <div class="card">
        <div class="items-header">
          <h2>Cart</h2>
        </div>
        <div id="cart">
          <p class="cart-empty">No items yet — add products from the catalog above.</p>
        </div>
      </div>

      <div class="footer">
        <div class="total">Total: $<span id="total">0.00</span></div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Place order</button>
      </div>

      <div id="message" class="message" role="alert"></div>
    </form>

    <div id="orders-view" class="view-panel hidden">
      <div class="card">
        <div class="items-header">
          <h2>My orders</h2>
        </div>
        <div class="orders-toolbar">
          <label for="orders-status-filter" class="hidden">Filter by status</label>
          <select id="orders-status-filter">
            <option value="">All statuses</option>
            <option value="PENDING">Pending</option>
            <option value="PROCESSING">Processing</option>
            <option value="SHIPPED">Shipped</option>
            <option value="DELIVERED">Delivered</option>
            <option value="CANCELLED">Cancelled</option>
          </select>
          <button type="button" class="btn btn-secondary" id="refresh-orders-btn">Refresh</button>
        </div>
        <div id="orders-list" class="orders-list">
          <p class="cart-empty">Loading orders…</p>
        </div>
      </div>
      <div id="orders-message" class="message" role="alert"></div>
    </div>
  </div>

  <template id="cart-item-template">
    <div class="cart-item">
      <div>
        <div class="name" data-field="name"></div>
        <div class="unit-price">$<span data-field="unit_price"></span> each</div>
      </div>
      <div>
        <label class="hidden">Qty</label>
        <input type="number" data-field="quantity" min="1" value="1" required>
      </div>
      <div class="unit-price">$<span data-field="line_total">0.00</span></div>
      <div>
        <button type="button" class="remove-btn" title="Remove item">&times;</button>
      </div>
    </div>
  </template>

  <script>
    const TOKEN_KEY = 'order_processing_token';
    const CUSTOMER_ID_KEY = 'order_processing_customer_id';
    const catalogEl = document.getElementById('catalog');
    const cartEl = document.getElementById('cart');
    const cartItemTemplate = document.getElementById('cart-item-template');
    const totalEl = document.getElementById('total');
    const messageEl = document.getElementById('message');
    const loginMessageEl = document.getElementById('login-message');
    const form = document.getElementById('order-form');
    const ordersViewEl = document.getElementById('orders-view');
    const ordersListEl = document.getElementById('orders-list');
    const ordersMessageEl = document.getElementById('orders-message');
    const ordersStatusFilterEl = document.getElementById('orders-status-filter');
    const appNavEl = document.getElementById('app-nav');
    const loginForm = document.getElementById('login-form');
    const authCard = document.getElementById('auth-card');
    const authBar = document.getElementById('auth-bar');
    const authCustomerIdEl = document.getElementById('auth-customer-id');
    const submitBtn = document.getElementById('submit-btn');
    const authSubmitBtn = document.getElementById('auth-submit-btn');
    const tabSignin = document.getElementById('tab-signin');
    const tabSignup = document.getElementById('tab-signup');
    const authTitle = document.getElementById('auth-title');
    const authHint = document.getElementById('auth-hint');
    const confirmPasswordField = document.getElementById('confirm-password-field');
    const confirmPasswordInput = document.getElementById('confirm_password');

    let authMode = 'signin';
    let products = [];
    let activeView = 'shop';
    const cart = new Map();
    const ORDERS_POLL_INTERVAL_MS = 3000;
    let ordersPollTimer = null;

    function formatPrice(value) {
      return Number(value).toFixed(2);
    }

    function getCartQty(productId) {
      return cart.get(productId)?.quantity || 0;
    }

    function getAvailableStock(product) {
      return product.stock - getCartQty(product.id);
    }

    function updateProductCard(product) {
      const card = catalogEl.querySelector('[data-product-id="' + product.id + '"]');
      if (!card) return;

      const available = getAvailableStock(product);
      const inCart = getCartQty(product.id);
      const stockEl = card.querySelector('.stock');

      stockEl.classList.toggle('out-of-stock', available <= 0);
      stockEl.textContent = available <= 0 ? 'Out of stock' : available + ' in stock';

      renderProductActions(card, product, inCart, available);
    }

    function renderProductActions(card, product, inCart, available) {
      let actions = card.querySelector('.product-actions');
      if (!actions) {
        actions = document.createElement('div');
        actions.className = 'product-actions';
        card.appendChild(actions);
      }
      actions.innerHTML = '';

      if (inCart === 0) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-secondary add-to-cart-btn';
        btn.textContent = available <= 0 ? 'Out of stock' : 'Add to cart';
        btn.disabled = available <= 0;
        btn.addEventListener('click', () => addToCart(product));
        actions.appendChild(btn);
        return;
      }

      const stepper = document.createElement('div');
      stepper.className = 'qty-stepper';

      const minusBtn = document.createElement('button');
      minusBtn.type = 'button';
      minusBtn.className = 'qty-btn';
      minusBtn.textContent = '−';
      minusBtn.setAttribute('aria-label', 'Remove one from cart');
      minusBtn.addEventListener('click', () => changeCartQty(product, -1));

      const qtyEl = document.createElement('span');
      qtyEl.className = 'qty-value';
      qtyEl.textContent = inCart;
      qtyEl.setAttribute('aria-label', inCart + ' in cart');

      const plusBtn = document.createElement('button');
      plusBtn.type = 'button';
      plusBtn.className = 'qty-btn';
      plusBtn.textContent = '+';
      plusBtn.setAttribute('aria-label', 'Add one to cart');
      plusBtn.disabled = available <= 0;
      plusBtn.addEventListener('click', () => addToCart(product));

      stepper.append(minusBtn, qtyEl, plusBtn);
      actions.appendChild(stepper);
    }

    function updateAllProductCards() {
      products.forEach(updateProductCard);
    }

    function renderCatalog() {
      if (!products.length) {
        catalogEl.innerHTML = '<p class="cart-empty">No products available.</p>';
        return;
      }

      catalogEl.innerHTML = '';
      products.forEach((product) => {
        const card = document.createElement('article');
        card.className = 'product-card';
        card.dataset.productId = product.id;
        card.innerHTML =
          '<img src="' + product.image_url + '" alt="' + product.name + '" loading="lazy">' +
          '<span class="category">' + product.category + '</span>' +
          '<h3>' + product.name + '</h3>' +
          '<p class="desc">' + product.description + '</p>' +
          '<div class="price">$' + formatPrice(product.price) + '</div>' +
          '<div class="stock">' + product.stock + ' in stock</div>';

        catalogEl.appendChild(card);
        updateProductCard(product);
      });
    }

    async function loadProducts() {
      try {
        const response = await fetch('/products', { headers: authHeaders() });
        if (response.status === 401) {
          clearToken();
          setAuthenticated(false);
          return;
        }
        if (!response.ok) {
          catalogEl.innerHTML = '<p class="cart-empty">Could not load products.</p>';
          return;
        }
        products = await response.json();
        renderCatalog();
      } catch (err) {
        catalogEl.innerHTML = '<p class="cart-empty">Could not reach the server.</p>';
      }
    }

    function renderCart() {
      if (cart.size === 0) {
        cartEl.innerHTML = '<p class="cart-empty">No items yet — add products from the catalog above.</p>';
        updateTotal();
        updateAllProductCards();
        return;
      }

      cartEl.innerHTML = '';
      cart.forEach((item, productId) => {
        const row = cartItemTemplate.content.firstElementChild.cloneNode(true);
        row.dataset.productId = productId;
        row.querySelector('[data-field="name"]').textContent = item.product_name;
        row.querySelector('[data-field="unit_price"]').textContent = formatPrice(item.unit_price);
        row.querySelector('[data-field="quantity"]').value = item.quantity;
        row.querySelector('[data-field="line_total"]').textContent = formatPrice(item.quantity * item.unit_price);

        row.querySelector('[data-field="quantity"]').addEventListener('input', (event) => {
          const product = products.find((p) => p.id === productId);
          const maxQty = product ? product.stock : 1;
          const qty = Math.min(maxQty, Math.max(1, Number(event.target.value) || 1));
          item.quantity = qty;
          event.target.value = qty;
          row.querySelector('[data-field="line_total"]').textContent = formatPrice(qty * item.unit_price);
          updateTotal();
          updateAllProductCards();
        });

        row.querySelector('.remove-btn').addEventListener('click', () => {
          cart.delete(productId);
          renderCart();
          updateAllProductCards();
        });

        cartEl.appendChild(row);
      });
      updateTotal();
    }

    function addToCart(product) {
      if (getAvailableStock(product) <= 0) return;

      const existing = cart.get(product.id);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.set(product.id, {
          product_id: product.id,
          product_name: product.name,
          quantity: 1,
          unit_price: product.price,
        });
      }
      renderCart();
      updateProductCard(product);
    }

    function changeCartQty(product, delta) {
      const existing = cart.get(product.id);
      if (!existing) return;

      if (delta > 0) {
        addToCart(product);
        return;
      }

      existing.quantity -= 1;
      if (existing.quantity <= 0) {
        cart.delete(product.id);
      }
      renderCart();
      updateProductCard(product);
    }

    function getToken() {
      return sessionStorage.getItem(TOKEN_KEY);
    }

    function setToken(token) {
      sessionStorage.setItem(TOKEN_KEY, token);
    }

    function clearToken() {
      sessionStorage.removeItem(TOKEN_KEY);
      sessionStorage.removeItem(CUSTOMER_ID_KEY);
    }

    function setCustomerId(customerId) {
      if (customerId) {
        sessionStorage.setItem(CUSTOMER_ID_KEY, customerId);
      } else {
        sessionStorage.removeItem(CUSTOMER_ID_KEY);
      }
      authCustomerIdEl.textContent = customerId || '—';
    }

    function parseTokenClaims(token) {
      try {
        const payload = token.split('.')[1];
        const normalized = payload.replace(/-/g, '+').replace(/_/g, '/');
        return JSON.parse(atob(normalized));
      } catch (err) {
        return null;
      }
    }

    function getCustomerId() {
      const stored = sessionStorage.getItem(CUSTOMER_ID_KEY);
      if (stored) {
        return stored;
      }

      const token = getToken();
      if (!token) {
        return '';
      }

      const claims = parseTokenClaims(token);
      const customerId = claims?.customer_id || '';
      if (customerId) {
        setCustomerId(customerId);
      }
      return customerId;
    }

    function authHeaders(extra = {}) {
      const headers = { ...extra };
      const token = getToken();
      if (token) {
        headers.Authorization = 'Bearer ' + token;
      }
      return headers;
    }

    function setAuthenticated(isAuthenticated) {
      authCard.classList.toggle('hidden', isAuthenticated);
      authBar.classList.toggle('hidden', !isAuthenticated);
      appNavEl.classList.toggle('hidden', !isAuthenticated);
      if (isAuthenticated) {
        setCustomerId(getCustomerId());
        showView(activeView);
        loadProducts();
        if (activeView === 'orders') {
          loadOrders();
        }
      } else {
        stopOrdersPolling();
        setCustomerId('');
        form.classList.add('hidden');
        ordersViewEl.classList.add('hidden');
      }
    }

    function stopOrdersPolling() {
      if (ordersPollTimer !== null) {
        clearInterval(ordersPollTimer);
        ordersPollTimer = null;
      }
    }

    function startOrdersPolling() {
      stopOrdersPolling();
      ordersPollTimer = setInterval(() => {
        if (activeView === 'orders' && getToken()) {
          loadOrders({ silent: true });
        }
      }, ORDERS_POLL_INTERVAL_MS);
    }

    function showView(view) {
      activeView = view;
      const isShop = view === 'shop';
      form.classList.toggle('hidden', !isShop);
      ordersViewEl.classList.toggle('hidden', isShop);
      appNavEl.querySelectorAll('.app-nav-tab').forEach((tab) => {
        tab.classList.toggle('active', tab.dataset.view === view);
      });
      if (!isShop) {
        loadOrders();
        startOrdersPolling();
      } else {
        stopOrdersPolling();
      }
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleString();
    }

    function statusBadgeClass(status) {
      return 'status-badge ' + String(status || '').toLowerCase();
    }

    function showOrdersMessage(type, text) {
      ordersMessageEl.className = 'message visible ' + type;
      ordersMessageEl.textContent = text;
    }

    function clearOrdersMessage() {
      ordersMessageEl.className = 'message';
      ordersMessageEl.textContent = '';
    }

    async function loadOrders(options = {}) {
      const silent = options.silent === true;
      if (!silent) {
        ordersListEl.innerHTML = '<p class="loading">Loading orders…</p>';
        clearOrdersMessage();
      }

      const status = ordersStatusFilterEl.value;
      const url = status ? '/orders?status=' + encodeURIComponent(status) : '/orders';

      try {
        const response = await fetch(url, { headers: authHeaders() });
        if (response.status === 401) {
          stopOrdersPolling();
          clearToken();
          setAuthenticated(false);
          showLoginMessage('error', 'Session expired. Please sign in again.');
          return;
        }
        if (!response.ok) {
          if (!silent) {
            const body = await response.json();
            ordersListEl.innerHTML = '<p class="cart-empty">Could not load orders.</p>';
            showOrdersMessage('error', body.error || 'Could not load orders.');
          }
          return;
        }

        const orders = await response.json();
        renderOrders(orders);
      } catch (err) {
        if (!silent) {
          ordersListEl.innerHTML = '<p class="cart-empty">Could not reach the server.</p>';
          showOrdersMessage('error', 'Could not reach the server.');
        }
      }
    }

    function renderOrders(orders) {
      if (!orders.length) {
        ordersListEl.innerHTML = '<p class="cart-empty">No orders yet — add items in Shop and place your first order.</p>';
        return;
      }

      ordersListEl.innerHTML = '';
      orders
        .slice()
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
        .forEach((order) => {
          const card = document.createElement('article');
          card.className = 'order-card';

          const itemsHtml = (order.items || [])
            .map((item) =>
              '<li><span>' + item.product_name + ' × ' + item.quantity + '</span>' +
              '<span>$' + formatPrice(item.quantity * item.unit_price) + '</span></li>'
            )
            .join('');

          card.innerHTML =
            '<div class="order-card-header">' +
              '<div>' +
                '<h3>Order ' + order.id + '</h3>' +
                '<p class="meta">Placed ' + formatDate(order.created_at) + '</p>' +
                '<span class="' + statusBadgeClass(order.status) + '">' + order.status + '</span>' +
              '</div>' +
              '<div class="order-card-total">$' + formatPrice(order.total) + '</div>' +
            '</div>' +
            '<ul class="order-items">' + itemsHtml + '</ul>';

          if (order.status === 'PENDING') {
            const actions = document.createElement('div');
            actions.className = 'order-card-actions';
            const cancelBtn = document.createElement('button');
            cancelBtn.type = 'button';
            cancelBtn.className = 'btn btn-danger';
            cancelBtn.textContent = 'Cancel order';
            cancelBtn.addEventListener('click', () => cancelOrder(order.id));
            actions.appendChild(cancelBtn);
            card.appendChild(actions);
          }

          ordersListEl.appendChild(card);
        });
    }

    async function cancelOrder(orderId) {
      clearOrdersMessage();
      try {
        const response = await fetch('/orders/' + encodeURIComponent(orderId) + '/cancel', {
          method: 'POST',
          headers: authHeaders(),
        });
        const body = await response.json();
        if (response.status === 401) {
          clearToken();
          setAuthenticated(false);
          showLoginMessage('error', 'Session expired. Please sign in again.');
          return;
        }
        if (!response.ok) {
          showOrdersMessage('error', body.error || 'Could not cancel order.');
          return;
        }
        showOrdersMessage('success', 'Order cancelled.');
        loadOrders();
      } catch (err) {
        showOrdersMessage('error', 'Could not reach the server.');
      }
    }

    function setAuthMode(mode) {
      authMode = mode;
      const isSignup = mode === 'signup';
      tabSignin.classList.toggle('active', !isSignup);
      tabSignup.classList.toggle('active', isSignup);
      authTitle.textContent = isSignup ? 'Create account' : 'Sign in';
      authSubmitBtn.textContent = isSignup ? 'Create account' : 'Sign in';
      authHint.classList.toggle('hidden', isSignup);
      confirmPasswordField.classList.toggle('hidden', !isSignup);
      confirmPasswordInput.required = isSignup;
      document.getElementById('password').autocomplete = isSignup ? 'new-password' : 'current-password';
      clearLoginMessage();
    }

    function showLoginMessage(type, text) {
      loginMessageEl.className = 'message visible ' + type;
      loginMessageEl.textContent = text;
    }

    function clearLoginMessage() {
      loginMessageEl.className = 'message';
      loginMessageEl.textContent = '';
    }

    function updateTotal() {
      let total = 0;
      cart.forEach((item) => {
        total += item.quantity * item.unit_price;
      });
      totalEl.textContent = formatPrice(total);
    }

    function collectItems() {
      return Array.from(cart.values());
    }

    function showMessage(type, text, detail) {
      messageEl.className = 'message visible ' + type;
      messageEl.innerHTML = text + (detail ? '<pre>' + detail + '</pre>' : '');
    }

    function clearMessage() {
      messageEl.className = 'message';
      messageEl.textContent = '';
    }

    document.getElementById('logout-btn').addEventListener('click', () => {
      clearToken();
      cart.clear();
      renderCart();
      setAuthenticated(false);
      clearMessage();
      clearLoginMessage();
    });

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearLoginMessage();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const isSignup = authMode === 'signup';

      if (isSignup) {
        if (password.length < 6) {
          showLoginMessage('error', 'Password must be at least 6 characters.');
          return;
        }
        if (password !== confirmPasswordInput.value) {
          showLoginMessage('error', 'Passwords do not match.');
          return;
        }
      }

      authSubmitBtn.disabled = true;
      authSubmitBtn.textContent = isSignup ? 'Creating account…' : 'Signing in…';

      try {
        const response = await fetch(isSignup ? '/auth/signup' : '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const body = await response.json();
        if (!response.ok) {
          showLoginMessage('error', body.error || (isSignup ? 'Sign up failed' : 'Sign in failed'));
          return;
        }

        setToken(body.token);
        setCustomerId(body.customer_id);
        setAuthenticated(true);
        loginForm.reset();
        setAuthMode('signin');
      } catch (err) {
        showLoginMessage('error', 'Could not reach the server.');
      } finally {
        authSubmitBtn.disabled = false;
        authSubmitBtn.textContent = isSignup ? 'Create account' : 'Sign in';
      }
    });

    tabSignin.addEventListener('click', () => setAuthMode('signin'));
    tabSignup.addEventListener('click', () => setAuthMode('signup'));

    appNavEl.querySelectorAll('.app-nav-tab').forEach((tab) => {
      tab.addEventListener('click', () => showView(tab.dataset.view));
    });
    document.getElementById('refresh-orders-btn').addEventListener('click', loadOrders);
    ordersStatusFilterEl.addEventListener('change', loadOrders);

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearMessage();

      const items = collectItems();
      if (!items.length) {
        showMessage('error', 'Add at least one product to your cart.');
        return;
      }

      const customerId = getCustomerId();
      if (!customerId) {
        showMessage('error', 'Customer ID missing. Please sign in again.');
        return;
      }

      const payload = {
        customer_id: customerId,
        items,
      };

      submitBtn.disabled = true;
      submitBtn.textContent = 'Placing order…';

      try {
        const response = await fetch('/orders', {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify(payload),
        });

        const body = await response.json();

        if (response.status === 401) {
          clearToken();
          setAuthenticated(false);
          showLoginMessage('error', 'Session expired. Please sign in again.');
          return;
        }

        if (!response.ok) {
          const errText = body.error || 'Request failed';
          showMessage('error', errText, JSON.stringify(body, null, 2));
          return;
        }

        showMessage(
          'success',
          'Order placed successfully. Order ID: <strong>' + body.id + '</strong> (status: ' + body.status + '). ' +
          'Status updates automatically on My orders.',
          JSON.stringify(body, null, 2)
        );
        showView('orders');
        showOrdersMessage('success', 'Order placed. Status updates automatically every few seconds.');
        cart.clear();
        renderCart();
      } catch (err) {
        showMessage('error', 'Could not reach the server. Is it running on this host?');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Place order';
      }
    });

    setAuthenticated(!!getToken());
  </script>
</body>

</html>
